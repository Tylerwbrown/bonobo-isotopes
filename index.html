<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Isotope Power Explorer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #080c14; }
  </style>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;

const isotopes = [
  {
    id: "c14", name: "Carbon-14", symbol: "\u00b9\u2074C", halfLifeYears: 5730,
    avgBetaKeV: 49, atomicMass: 14, decayType: "\u03b2\u207b",
    shielding: "Trivial \u2014 any solid barrier", dangerLevel: 1,
    color: "#22d3ee", efficiency: 0.03, isRTG: false,
    notes: "Decays to nitrogen-14 (air). Half-life of 5,730 years \u2014 lasts millennia. Abundant nuclear waste byproduct.",
  },
  {
    id: "h3", name: "Tritium", symbol: "\u00b3H", halfLifeYears: 12.3,
    avgBetaKeV: 5.7, atomicMass: 3, decayType: "\u03b2\u207b",
    shielding: "Trivial \u2014 any solid barrier", dangerLevel: 1,
    color: "#34d399", efficiency: 0.05, isRTG: false,
    notes: "Lowest energy beta emitter. Watch dials, gun sights, commercial betavoltaics. Decays to helium-3.",
  },
  {
    id: "ni63", name: "Nickel-63", symbol: "\u2076\u00b3Ni", halfLifeYears: 100,
    avgBetaKeV: 17, atomicMass: 63, decayType: "\u03b2\u207b",
    shielding: "Trivial \u2014 phone case stops it", dangerLevel: 1,
    color: "#60a5fa", efficiency: 0.088, isRTG: false,
    notes: "Safest practical option. Betavolt BV100 uses this. Decays to stable copper-63. Very limited supply.",
  },
  {
    id: "pm147", name: "Promethium-147", symbol: "\u00b9\u2074\u2077Pm", halfLifeYears: 2.62,
    avgBetaKeV: 62, atomicMass: 147, decayType: "\u03b2\u207b",
    shielding: "Thin metal sheet", dangerLevel: 2,
    color: "#a78bfa", efficiency: 0.10, isRTG: false,
    notes: "Early nuclear pacemakers. Decays to samarium-147. Fades within ~10 years. Fission product.",
  },
  {
    id: "sr90", name: "Strontium-90", symbol: "\u2079\u2070Sr", halfLifeYears: 28.8,
    avgBetaKeV: 196, atomicMass: 90, decayType: "\u03b2\u207b (+ \u2079\u2070Y)",
    shielding: "mm of metal + bremsstrahlung", dangerLevel: 3,
    color: "#f97316", efficiency: 0.08, isRTG: false,
    effectiveBetaKeV: 580,
    notes: "0.95 W/g thermal. Soviet lighthouse RTGs. Abundant fission product. Bone-seeking fallout isotope.",
  },
  {
    id: "pu238", name: "Plutonium-238", symbol: "\u00b2\u00b3\u2078Pu", halfLifeYears: 87.7,
    atomicMass: 238, decayType: "\u03b1",
    shielding: "Alpha stopped by paper \u2014 lethal if inhaled", dangerLevel: 4,
    color: "#ef4444", efficiency: 0.06, isRTG: true, thermalWPerGram: 0.57,
    notes: "Mars rovers & Voyager. 0.57 W/g thermal. US produces ~1.5 kg/year. Very expensive.",
  },
  {
    id: "po210", name: "Polonium-210", symbol: "\u00b2\u00b9\u2070Po", halfLifeYears: 0.379,
    atomicMass: 210, decayType: "\u03b1",
    shielding: "Alpha stopped by paper \u2014 intensely radioactive", dangerLevel: 4,
    color: "#ff2d55", efficiency: 0.06, isRTG: true, thermalWPerGram: 140,
    notes: "~140 W/g. Glows red-hot. Soviet Lunokhod rovers. Dead in ~2 years. Litvinenko assassination (2006).",
  },
];

const massRefs = [
  { g: 1, label: "a paperclip" },
  { g: 5, label: "a nickel coin" },
  { g: 15, label: "a AA battery" },
  { g: 30, label: "a mouse" },
  { g: 100, label: "a bar of soap" },
  { g: 200, label: "a smartphone" },
  { g: 500, label: "a bottle of wine" },
  { g: 1000, label: "a liter of water" },
  { g: 2000, label: "a laptop" },
  { g: 5000, label: "a bowling ball" },
  { g: 10000, label: "a toddler" },
  { g: 25000, label: "a car tire" },
  { g: 50000, label: "a large dog" },
  { g: 80000, label: "an adult human" },
  { g: 200000, label: "a male lion" },
  { g: 500000, label: "a grand piano" },
  { g: 1000000, label: "a small car" },
  { g: 2000000, label: "a hippo" },
  { g: 5000000, label: "an African elephant" },
];

function getMassRef(grams) {
  let closest = massRefs[0];
  for (const r of massRefs) {
    if (Math.abs(Math.log10(r.g) - Math.log10(grams)) < Math.abs(Math.log10(closest.g) - Math.log10(grams))) {
      closest = r;
    }
  }
  return closest;
}

function formatMass(g) {
  if (g >= 1000000) return `${(g / 1000000).toFixed(g >= 10000000 ? 0 : 1)} Mg`;
  if (g >= 1000) return `${(g / 1000).toFixed(g >= 10000 ? 0 : 1)} kg`;
  return `${g.toFixed(g < 10 ? 1 : 0)} g`;
}

const AVOGADRO = 6.022e23;
const KEV_TO_JOULES = 1.602e-16;

function calcProps(isotope, grams) {
  const halfLifeSeconds = isotope.halfLifeYears * 365.25 * 24 * 3600;
  const decayConstant = Math.log(2) / halfLifeSeconds;
  const atoms = (grams / isotope.atomicMass) * AVOGADRO;
  const decaysPerSecond = atoms * decayConstant;
  let thermalPowerW, electricalPowerW, totalThermalEnergyKWh, totalElectricalEnergyKWh;
  if (isotope.isRTG) {
    thermalPowerW = grams * isotope.thermalWPerGram;
    electricalPowerW = thermalPowerW * isotope.efficiency;
    totalThermalEnergyKWh = (thermalPowerW * (1 / decayConstant)) / 3600000;
    totalElectricalEnergyKWh = totalThermalEnergyKWh * isotope.efficiency;
  } else {
    const ePerDecay = (isotope.effectiveBetaKeV || isotope.avgBetaKeV) * KEV_TO_JOULES;
    thermalPowerW = decaysPerSecond * ePerDecay;
    electricalPowerW = thermalPowerW * isotope.efficiency;
    const totalJ = atoms * (isotope.effectiveBetaKeV || isotope.avgBetaKeV) * KEV_TO_JOULES;
    totalThermalEnergyKWh = totalJ / 3600000;
    totalElectricalEnergyKWh = totalThermalEnergyKWh * isotope.efficiency;
  }
  const powerAt50yrs = electricalPowerW * Math.pow(0.5, 50 / isotope.halfLifeYears);
  return {
    thermalPowerW, electricalPowerW, totalThermalEnergyKWh, totalElectricalEnergyKWh,
    powerAt50yrs,
    smartphoneCharges: totalElectricalEnergyKWh / 0.017,
    teslaCharges: totalElectricalEnergyKWh / 75,
    homeMonths: totalElectricalEnergyKWh / 900,
  };
}

function fmtP(w) {
  if (w >= 1e6) return `${(w / 1e6).toFixed(1)} MW`;
  if (w >= 1e3) return `${(w / 1e3).toFixed(1)} kW`;
  if (w >= 1) return `${w.toFixed(2)} W`;
  if (w >= 1e-3) return `${(w * 1e3).toFixed(1)} mW`;
  if (w >= 1e-6) return `${(w * 1e6).toFixed(1)} \u00b5W`;
  if (w >= 1e-9) return `${(w * 1e9).toFixed(2)} nW`;
  return `${(w * 1e12).toFixed(1)} pW`;
}
function fmtE(kwh) {
  if (kwh >= 1e6) return `${(kwh / 1e6).toFixed(1)} GWh`;
  if (kwh >= 1e3) return `${(kwh / 1e3).toFixed(1)} MWh`;
  if (kwh >= 1) return `${kwh.toFixed(1)} kWh`;
  if (kwh >= 1e-3) return `${(kwh * 1e3).toFixed(1)} Wh`;
  if (kwh >= 1e-6) return `${(kwh * 1e6).toFixed(1)} mWh`;
  return `${(kwh * 1e9).toFixed(1)} \u00b5Wh`;
}
function fmtN(n) {
  if (n >= 1e9) return `${(n / 1e9).toFixed(1)}B`;
  if (n >= 1e6) return `${(n / 1e6).toFixed(1)}M`;
  if (n >= 1e4) return `${(n / 1e3).toFixed(0)}K`;
  if (n >= 1e3) return `${(n / 1e3).toFixed(1)}K`;
  if (n < 1e-4) return n.toExponential(1);
  if (n < 0.01) return n.toFixed(4);
  if (n < 1) return n.toFixed(2);
  return Math.round(n).toLocaleString();
}

function DangerBar({ level }) {
  const c = ["", "#4ade80", "#c4b5fd", "#fb923c", "#f87171"];
  const l = ["", "Minimal", "Moderate", "High", "Extreme"];
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 5 }}>
      <div style={{ display: "flex", gap: 2 }}>
        {[1,2,3,4].map(i => <div key={i} style={{ width: 13, height: 4, borderRadius: 2, background: i <= level ? c[level] : "rgba(255,255,255,0.04)" }} />)}
      </div>
      <span style={{ fontSize: 8, color: c[level], fontWeight: 600 }}>{l[level]}</span>
    </div>
  );
}

function InfoTip({ text }) {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  useEffect(() => {
    if (!open) return;
    const h = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", h); document.addEventListener("touchstart", h);
    return () => { document.removeEventListener("mousedown", h); document.removeEventListener("touchstart", h); };
  }, [open]);
  return (
    <span ref={ref} style={{ position: "relative", display: "inline-block", marginLeft: 4 }}>
      <span onClick={() => setOpen(!open)} style={{
        display: "inline-flex", alignItems: "center", justifyContent: "center",
        width: 12, height: 12, borderRadius: "50%",
        background: open ? "rgba(255,255,255,0.1)" : "rgba(255,255,255,0.04)",
        color: open ? "#8a9ab0" : "#3a4e5e", fontSize: 7, fontWeight: 800,
        cursor: "pointer", userSelect: "none",
      }}>?</span>
      {open && <div style={{
        position: "absolute", bottom: 18, left: "50%", transform: "translateX(-50%)",
        width: 200, padding: "8px 10px", borderRadius: 6,
        background: "#151e2d", border: "1px solid rgba(100,140,180,0.15)",
        fontSize: 9, lineHeight: 1.55, color: "#7a8ea0", zIndex: 20,
        boxShadow: "0 6px 20px rgba(0,0,0,0.5)",
      }}>{text}</div>}
    </span>
  );
}

function Pip({ on }) {
  return <span style={{
    display: "inline-block", width: 6, height: 6, borderRadius: "50%", flexShrink: 0,
    background: on ? "#4ade80" : "rgba(255,255,255,0.04)",
    border: on ? "1px solid rgba(74,222,128,0.25)" : "1px solid rgba(255,255,255,0.03)",
  }} />;
}

const LOG_MIN = 0;
const LOG_MAX = Math.log10(5000000);

function MassSlider({ grams, onChange }) {
  const trackRef = useRef(null);
  const [dragging, setDragging] = useState(false);

  const logVal = Math.log10(Math.max(grams, 1));
  const pct = ((logVal - LOG_MIN) / (LOG_MAX - LOG_MIN)) * 100;

  const updateFromPosition = useCallback((clientX) => {
    const rect = trackRef.current.getBoundingClientRect();
    const rawPct = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
    const logG = LOG_MIN + rawPct * (LOG_MAX - LOG_MIN);
    const rawG = Math.pow(10, logG);
    const niceValues = [1,2,5,10,20,50,100,200,500,1000,2000,5000,10000,20000,50000,100000,200000,500000,1000000,2000000,5000000];
    let closest = niceValues[0];
    let closestDist = Infinity;
    for (const v of niceValues) {
      const dist = Math.abs(Math.log10(v) - Math.log10(rawG));
      if (dist < closestDist) { closestDist = dist; closest = v; }
    }
    let snapped = closestDist < 0.08 ? closest : Math.round(rawG / Math.pow(10, Math.floor(Math.log10(rawG)))) * Math.pow(10, Math.floor(Math.log10(rawG)));
    snapped = Math.max(1, Math.min(5000000, snapped));
    onChange(snapped);
  }, [onChange]);

  const handlePointerDown = (e) => {
    setDragging(true);
    e.target.setPointerCapture(e.pointerId);
    updateFromPosition(e.clientX);
  };
  const handlePointerMove = (e) => { if (dragging) updateFromPosition(e.clientX); };
  const handlePointerUp = () => setDragging(false);

  const massRef = getMassRef(grams);

  const tickMarks = [
    { g: 1, label: "1g" }, { g: 10, label: "10g" }, { g: 100, label: "100g" },
    { g: 1000, label: "1kg" }, { g: 10000, label: "10kg" }, { g: 100000, label: "100kg" },
    { g: 1000000, label: "1Mg" },
  ];

  return (
    <div style={{ marginBottom: 18 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 6 }}>
        <div style={{ fontSize: 9, color: "#3e5060", fontWeight: 600, letterSpacing: "0.1em" }}>MASS</div>
        <div>
          <span style={{ fontSize: 16, fontWeight: 800, color: "#8a9ab0", letterSpacing: "-0.02em" }}>
            {formatMass(grams)}
          </span>
          <span style={{ fontSize: 9, color: "#3e5060", marginLeft: 8, fontStyle: "italic" }}>
            {"\u2248"} {massRef.label}
          </span>
        </div>
      </div>
      <div
        ref={trackRef}
        onPointerDown={handlePointerDown}
        onPointerMove={handlePointerMove}
        onPointerUp={handlePointerUp}
        style={{ position: "relative", height: 32, cursor: "pointer", touchAction: "none", userSelect: "none" }}
      >
        <div style={{
          position: "absolute", top: 12, left: 0, right: 0, height: 4,
          background: "rgba(255,255,255,0.04)", borderRadius: 2,
        }}>
          <div style={{
            width: `${pct}%`, height: "100%", borderRadius: 2,
            background: "linear-gradient(90deg, rgba(138,154,176,0.1), rgba(138,154,176,0.25))",
            transition: dragging ? "none" : "width 0.15s ease",
          }} />
        </div>
        {tickMarks.map(t => {
          const tp = ((Math.log10(t.g) - LOG_MIN) / (LOG_MAX - LOG_MIN)) * 100;
          return (
            <div key={t.g} style={{ position: "absolute", left: `${tp}%`, top: 8 }}>
              <div style={{ width: 1, height: 12, background: "rgba(255,255,255,0.06)", marginLeft: -0.5 }} />
              <div style={{ fontSize: 7, color: "#2a3a4a", textAlign: "center", marginTop: 1, marginLeft: -14, width: 28 }}>{t.label}</div>
            </div>
          );
        })}
        <div style={{
          position: "absolute", left: `${pct}%`, top: 6,
          width: 16, height: 16, borderRadius: "50%",
          background: "#8a9ab0", border: "2px solid #080c14",
          transform: "translateX(-50%)",
          boxShadow: dragging ? "0 0 10px rgba(138,154,176,0.3)" : "0 0 4px rgba(138,154,176,0.15)",
          transition: dragging ? "none" : "left 0.15s ease, box-shadow 0.2s",
        }} />
      </div>
    </div>
  );
}

function App() {
  const [isoIdx, setIsoIdx] = useState(2);
  const [grams, setGrams] = useState(1000);

  const iso = isotopes[isoIdx];
  const data = calcProps(iso, grams);

  const capabilities = [
    { label: "Pacemaker", p: "~50 \u00b5W", t: 0.00005 },
    { label: "LED indicator", p: "~1 mW", t: 0.001 },
    { label: "Smartwatch", p: "~5 mW", t: 0.005 },
    { label: "Smartphone", p: "~4 W", t: 4 },
    { label: "Lightbulb", p: "~9 W", t: 9 },
    { label: "Laptop", p: "~30 W", t: 30 },
    { label: "Gaming PC", p: "~500 W", t: 500 },
    { label: "House", p: "~5 kW", t: 5000 },
    { label: "Small EV motor", p: "~10 kW", t: 10000 },
    { label: "Neighborhood", p: "~500 kW", t: 500000 },
  ];

  const cross = isotopes.map(i2 => ({ ...i2, d: calcProps(i2, grams) }));
  const allP = cross.map(c => c.d.electricalPowerW);
  const mxL = Math.log10(Math.max(...allP));
  const mnL = Math.log10(Math.max(Math.min(...allP), 1e-15));
  const pctRem = iso.halfLifeYears < 0.5 ? 0 : (data.powerAt50yrs / data.electricalPowerW * 100);

  return (
    <div style={{
      background: "#080c14", minHeight: "100vh",
      display: "flex", flexDirection: "column", alignItems: "center",
      padding: "24px 16px",
      fontFamily: "'JetBrains Mono', 'SF Mono', 'Fira Code', monospace",
      color: "#b8c8d8",
    }}>
      <div style={{ maxWidth: 640, width: "100%" }}>

        <div style={{ textAlign: "center", marginBottom: 24 }}>
          <h1 style={{ fontSize: 14, fontWeight: 700, color: "#dce8f4", letterSpacing: "0.1em", textTransform: "uppercase", margin: "0 0 3px 0" }}>
            Isotope Power Explorer
          </h1>
          <p style={{ fontSize: 9, color: "#3e5060", margin: 0, letterSpacing: "0.05em", fontStyle: "italic" }}>
            electricity from atoms falling apart; no reactors, just decay
          </p>
        </div>

        <div style={{ marginBottom: 4, fontSize: 9, color: "#3e5060", fontWeight: 600, letterSpacing: "0.1em" }}>ISOTOPE</div>
        <div style={{ display: "flex", gap: 4, marginBottom: 16, flexWrap: "wrap" }}>
          {isotopes.map((i2, i) => (
            <button key={i2.id} onClick={() => setIsoIdx(i)} style={{
              padding: "6px 10px", borderRadius: 5, fontSize: 11, fontWeight: 700,
              fontFamily: "inherit", cursor: "pointer", transition: "all 0.15s",
              border: isoIdx === i ? `1px solid ${i2.color}55` : "1px solid rgba(80,110,140,0.08)",
              background: isoIdx === i ? `${i2.color}12` : "rgba(255,255,255,0.01)",
              color: isoIdx === i ? i2.color : "#3e5060",
            }}>{i2.symbol}</button>
          ))}
        </div>

        <MassSlider grams={grams} onChange={setGrams} />

        <div style={{
          background: `${iso.color}05`, borderRadius: 8,
          padding: "11px 13px", marginBottom: 12,
          border: `1px solid ${iso.color}15`,
        }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 5 }}>
            <div>
              <span style={{ fontSize: 14, fontWeight: 800, color: iso.color }}>{iso.symbol}</span>
              <span style={{ fontSize: 10, color: "#5a6e80", marginLeft: 7 }}>{iso.name}</span>
            </div>
            <div style={{ textAlign: "right" }}>
              <div style={{ fontSize: 8, color: "#3e5060" }}>Half-life</div>
              <div style={{ fontSize: 12, fontWeight: 700, color: "#b8c8d8" }}>
                {iso.halfLifeYears >= 1 ? `${iso.halfLifeYears.toLocaleString()} yr` : `${Math.round(iso.halfLifeYears * 365)} days`}
              </div>
            </div>
          </div>
          <div style={{ fontSize: 8, color: "#3e5060", marginBottom: 3 }}>{iso.decayType} {"\u00b7"} {iso.shielding}</div>
          <DangerBar level={iso.dangerLevel} />
          <div style={{ fontSize: 8, color: "#344050", marginTop: 5, lineHeight: 1.5 }}>{iso.notes}</div>
        </div>

        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 5, marginBottom: 12 }}>
          {[
            { label: "Electrical power", sub2: "day 1", val: fmtP(data.electricalPowerW), col: iso.color,
              sub: `Thermal: ${fmtP(data.thermalPowerW)}`,
              tip: "Usable electrical output right now. Thermal decay power \u00d7 conversion efficiency of the semiconductor or thermocouple." },
            { label: "After 50 years", val: pctRem < 0.001 ? "\u2248 0" : fmtP(data.powerAt50yrs), col: `${iso.color}88`,
              sub: pctRem < 0.001 ? "Fully depleted" : `${pctRem.toFixed(1)}% remaining`,
              tip: "Power after 50 years of decay. Short half-life isotopes will be fully depleted." },
            { label: "Lifetime elec. energy", val: fmtE(data.totalElectricalEnergyKWh), col: "#fbbf24",
              sub: (() => {
                const kwh = data.totalElectricalEnergyKWh;
                const cargoShipRefuel = 57000000;
                const freightTrainRefuel = 190000;
                const evCharge = 75;
                const phoneCharge = 0.017;
                if (kwh >= cargoShipRefuel * 10) return `\u2248 ${fmtN(kwh / cargoShipRefuel)} cargo ship refuels`;
                if (kwh >= freightTrainRefuel * 10) return `\u2248 ${fmtN(kwh / freightTrainRefuel)} freight train refuels`;
                if (kwh >= evCharge * 10) return `\u2248 ${fmtN(kwh / evCharge)} EV charges`;
                return `\u2248 ${fmtN(kwh / phoneCharge)} phone charges`;
              })(),
              tip: "Total electricity extracted over the full decay lifetime, integrating the exponential curve \u00d7 conversion efficiency. What you actually get." },
            { label: "Total decay energy", val: fmtE(data.totalThermalEnergyKWh), col: "#fbbf2455",
              sub: `${Math.round(iso.efficiency * 100)}% \u2192 electricity`,
              tip: "Total energy released by decay itself (mostly heat). Only the efficiency % becomes electricity \u2014 the rest is waste heat." },
          ].map((c, i) => (
            <div key={i} style={{
              background: "rgba(255,255,255,0.018)", borderRadius: 7,
              padding: "10px 11px", border: "1px solid rgba(80,110,140,0.05)",
            }}>
              <div style={{ fontSize: 7, color: "#3e5060", marginBottom: 2, display: "flex", alignItems: "center" }}>
                {c.label}{c.sub2 && <span style={{ color: "#2a3a4a", marginLeft: 3 }}>{c.sub2}</span>}
                <InfoTip text={c.tip} />
              </div>
              <div style={{ fontSize: 16, fontWeight: 800, color: c.col, letterSpacing: "-0.02em" }}>{c.val}</div>
              <div style={{ fontSize: 7, color: "#344050", marginTop: 1 }}>{c.sub}</div>
            </div>
          ))}
        </div>

        <div style={{
          background: "rgba(255,255,255,0.012)", borderRadius: 7,
          padding: "10px 12px", marginBottom: 12,
          border: "1px solid rgba(80,110,140,0.05)",
        }}>
          <div style={{ fontSize: 8, color: "#3e5060", fontWeight: 600, marginBottom: 7, letterSpacing: "0.08em" }}>CONTINUOUS POWER</div>
          {capabilities.map((c, i) => {
            const on = data.electricalPowerW >= c.t;
            return (
              <div key={i} style={{
                display: "flex", alignItems: "center", gap: 6, marginBottom: 3,
                opacity: on ? 1 : 0.2, transition: "opacity 0.25s",
              }}>
                <Pip on={on} />
                <span style={{ fontSize: 9, color: on ? "#b8c8d8" : "#2a3a4a", flex: 1 }}>{c.label}</span>
                <span style={{ fontSize: 8, color: on ? "#3e5060" : "#1a2a3a", fontWeight: 600 }}>{c.p}</span>
              </div>
            );
          })}
        </div>

        <div style={{
          background: "rgba(255,255,255,0.012)", borderRadius: 7,
          padding: "10px 12px", marginBottom: 12,
          border: "1px solid rgba(80,110,140,0.05)",
        }}>
          <div style={{ fontSize: 8, color: "#3e5060", fontWeight: 600, marginBottom: 7, letterSpacing: "0.08em" }}>
            ALL ISOTOPES AT {formatMass(grams).toUpperCase()}
          </div>
          {cross.sort((a, b) => b.d.electricalPowerW - a.d.electricalPowerW).map(item => {
            const range = mxL - mnL;
            const p = range > 0 ? ((Math.log10(Math.max(item.d.electricalPowerW, 1e-15)) - mnL) / range) * 100 : 50;
            const sel = item.id === iso.id;
            return (
              <div key={item.id} style={{ display: "flex", alignItems: "center", gap: 5, marginBottom: 3, opacity: sel ? 1 : 0.6 }}>
                <div style={{ width: 34, fontSize: 8, color: item.color, fontWeight: sel ? 800 : 600, textAlign: "right", flexShrink: 0 }}>{item.symbol}</div>
                <div style={{
                  flex: 1, height: 14, background: "rgba(255,255,255,0.02)",
                  borderRadius: 3, overflow: "hidden", position: "relative",
                  border: sel ? `1px solid ${item.color}25` : "1px solid transparent",
                }}>
                  <div style={{
                    width: `${Math.max(p, 0.5)}%`, height: "100%",
                    background: `linear-gradient(90deg, ${item.color}18, ${item.color}77)`,
                    borderRadius: 3,
                  }} />
                  <div style={{ position: "absolute", right: 4, top: 1.5, fontSize: 8, color: "#7a8ea0", fontWeight: 600 }}>
                    {fmtP(item.d.electricalPowerW)}
                  </div>
                </div>
                <div style={{ width: 44, fontSize: 7, color: "#2a3a4a", textAlign: "right", flexShrink: 0 }}>
                  {item.halfLifeYears >= 1 ? `${item.halfLifeYears.toLocaleString()}y` : `${Math.round(item.halfLifeYears * 365)}d`}
                </div>
              </div>
            );
          })}
          <div style={{ fontSize: 7, color: "#222e3a", marginTop: 5 }}>Log scale {"\u00b7"} {"\u00b2\u00b9\u2070"}Po {"\u2192"} {"\u00b9\u2074"}C spans ~10 orders of magnitude</div>
        </div>

        <div style={{
          background: "rgba(255,255,255,0.012)", borderRadius: 7,
          padding: "10px 12px", marginBottom: 12,
          border: "1px solid rgba(80,110,140,0.05)",
        }}>
          <div style={{ fontSize: 8, color: "#3e5060", fontWeight: 600, marginBottom: 7, letterSpacing: "0.08em" }}>THERMAL W/g</div>
          {[...isotopes].map(i2 => ({ ...i2, wpg: calcProps(i2, 1).thermalPowerW }))
            .sort((a, b) => b.wpg - a.wpg)
            .map(item => {
              const lx = Math.log10(140), ln = Math.log10(1e-7);
              const p = ((Math.log10(Math.max(item.wpg, 1e-8)) - ln) / (lx - ln)) * 100;
              const sel = item.id === iso.id;
              return (
                <div key={item.id} style={{ display: "flex", alignItems: "center", gap: 5, marginBottom: 3, opacity: sel ? 1 : 0.6 }}>
                  <div style={{ width: 34, fontSize: 8, color: item.color, fontWeight: sel ? 800 : 600, textAlign: "right", flexShrink: 0 }}>{item.symbol}</div>
                  <div style={{ flex: 1, height: 14, background: "rgba(255,255,255,0.02)", borderRadius: 3, overflow: "hidden", position: "relative", border: sel ? `1px solid ${item.color}25` : "1px solid transparent" }}>
                    <div style={{ width: `${Math.max(p, 0.5)}%`, height: "100%", background: `linear-gradient(90deg, ${item.color}18, ${item.color}77)`, borderRadius: 3 }} />
                    <div style={{ position: "absolute", right: 4, top: 1.5, fontSize: 8, color: "#7a8ea0", fontWeight: 600 }}>
                      {item.wpg >= 1 ? `${item.wpg.toFixed(1)} W/g` : item.wpg >= 1e-3 ? `${(item.wpg*1e3).toFixed(1)} mW/g` : `${(item.wpg*1e6).toFixed(2)} \u00b5W/g`}
                    </div>
                  </div>
                </div>
              );
            })}
        </div>

        <div style={{
          padding: "9px 12px", background: "rgba(255,255,255,0.012)", borderRadius: 6,
          border: "1px solid rgba(80,110,140,0.05)",
          fontSize: 8, lineHeight: 1.65, color: "#344050",
        }}>
          <span style={{ color: "#5a6e80", fontWeight: 700 }}>The tradeoff:</span>{" "}
          safety {"\u2194"} power {"\u2194"} longevity {"\u2014"} pick two.{" "}
          <span style={{ color: "#22d3ee" }}>{"\u00b9\u2074"}C</span> lasts millennia but barely trickles.{" "}
          <span style={{ color: "#ff2d55" }}>{"\u00b2\u00b9\u2070"}Po</span> produces 140 W/g but kills in micrograms and is gone in months.
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
